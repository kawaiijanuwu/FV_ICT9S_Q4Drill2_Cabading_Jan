<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body {
            background-image: url("https://goblueox.com/wp-content/uploads/2019/08/1-1.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 15px;
            border: none;
        }

        h1 {
            color: #1c0333;
            text-align: center;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #6fc7e4;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="card">
            <h1>Heat Index Checker</h1>

            <label for="temp">Temperature (°C):</label>
            <input class="form-control mb-2" type="number" id="temp" placeholder="Enter temperature">

            <label for="humid">Humidity (%):</label>
            <input class="form-control mb-3" type="number" id="humid" placeholder="Enter humidity">

            <button class="btn btn-info w-100" onclick="checkINDEX()">Check</button>
        </div>
    </div>

    <footer>
        Jan Cabading | 9-Sapphire
    </footer>

    <script>
        function checkINDEX(){
            var temp = Number(document.getElementById("temp").value);
            var humid = Number(document.getElementById("humid").value);
            var HeatIndex;

            HeatIndex = temp + (0.33 * humid) - 4; //heat index (how hot it feels), is determined by combining the air temperature (temp) with 33% of the humidity value, then subtracting 4 to adjust the result.

            var status = "";

            switch (true){
                case (HeatIndex <= 27): // compare
                    status = "Comfortable / Cool";
                    break;
                case (HeatIndex >= 28 && HeatIndex <= 32):
                    status = "Warm";
                    break;
                case (HeatIndex >= 33 && HeatIndex <= 37):
                    status = "Hot";
                    break;
                case (HeatIndex >= 38 && HeatIndex <= 41):
                    status = "Very Hot / Caution";
                    break;
                case (HeatIndex >= 42):
                    status = "Extreme Heat / Danger";
                    break;
            }

            alert(status);
        }
    </script>
</body>
</html>
